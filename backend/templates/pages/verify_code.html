{% extends 'base.html' %}
{% block title %}Подтверждение - Оценка ущерба{% endblock %}

{% block content %}
<div class="flex-1 flex flex-col px-6 py-8">
    <!-- Header -->
    <div class="mb-8">
        <a href="{% url 'phone_input' %}" class="inline-flex items-center text-gray-500 hover:text-gray-700 mb-6" data-testid="back-link">
            <i class="fa-solid fa-arrow-left mr-2"></i>
            Назад
        </a>
        <h1 class="font-heading text-2xl font-black text-gray-900" data-testid="verify-title">
            Введите код
        </h1>
        <p class="text-gray-500 mt-2">
            Код отправлен на номер<br>
            <span class="font-semibold text-gray-900">{{ phone }}</span>
        </p>
    </div>
    
    <!-- Code Input Form -->
    <form method="POST" class="flex-1 flex flex-col" data-testid="verify-form">
        {% csrf_token %}
        
        <div class="mb-8">
            <label for="code" class="block text-sm font-medium text-gray-700 mb-2">
                Код из SMS
            </label>
            <div class="flex gap-3 justify-center">
                <input 
                    type="text" 
                    id="code" 
                    name="code" 
                    maxlength="4"
                    pattern="[0-9]{4}"
                    inputmode="numeric"
                    data-testid="code-input"
                    class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-3xl font-bold text-center tracking-[0.5em] rounded-xl focus:ring-2 focus:ring-red-500 focus:border-red-500 block px-4 py-5 transition-all placeholder-gray-300"
                    placeholder="••••"
                    required
                    autocomplete="one-time-code"
                >
            </div>
            <p class="mt-4 text-sm text-center text-gray-500">
                Код для тестирования: <span class="font-mono font-bold text-red-600">1234</span>
            </p>
        </div>
        
        <div class="mt-auto space-y-4">
            <button 
                type="submit" 
                data-testid="verify-btn"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-4 rounded-xl transition-all btn-active shadow-lg shadow-red-200 text-lg"
            >
                Подтвердить
            </button>
            
            <button 
                type="button" 
                data-testid="resend-btn"
                class="w-full bg-white border-2 border-gray-200 hover:border-red-600 text-gray-600 hover:text-red-600 font-semibold py-3 px-4 rounded-xl transition-colors"
                onclick="alert('SMS отправлен повторно')"
            >
                <i class="fa-solid fa-rotate-right mr-2"></i>
                Отправить код повторно
            </button>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Auto-focus on code input
    document.getElementById('code').focus();
</script>
{% endblock %}
